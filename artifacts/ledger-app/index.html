<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#050810" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LEDGER AI" />
    <meta name="description" content="Personal budget and ledger app with AI-powered import and rules-based categorization" />
    <title>LEDGER AI</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:hsl(222 47% 7%);color:hsl(210 40% 98%);font-family:monospace;padding:2rem;flex-direction:column;gap:1rem;text-align:center"><div style="font-size:1.25rem;color:hsl(0 84% 60%)">Script error</div><div style="font-size:0.75rem;color:hsl(215 20% 65%);max-width:600px;word-break:break-word">' + (e.message || 'Unknown error') + '</div><button onclick="location.reload()" style="margin-top:1rem;padding:.5rem 1.5rem;background:hsl(217 91% 60%);color:white;border:none;border-radius:4px;cursor:pointer;font-family:monospace">RETRY</button></div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled promise rejection:', e.reason);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
